<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ThemeGroups</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="popup-container">
      <!-- Header -->
      <header class="popup-header">
        <h1 id="currentGroupName" class="current-group">Loading...</h1>
      </header>

      <!-- Body -->
      <main class="popup-body">
        <ul id="themesList" class="theme-list" aria-label="Theme options"></ul>
      </main>

      <!-- Footer -->
      <footer class="popup-footer">
        <button id="manageGroupsBtn" class="manage-btn" type="button">
          Manage Groups
        </button>
      </footer>
    </div>

    <!-- Popup logic -->
    <script type="module" src="popup.js"></script>
  </body>
</html>
