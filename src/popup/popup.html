<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Theme Group Switcher</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Theme Groups</h1>
    </header>

    <main class="main">
      <section class="groups-section">
        <h2>Your Groups</h2>
        <ul class="groups-list" id="groupsList">
          <li class="loading">Loading groups...</li>
        </ul>
      </section>
    </main>


    <div class="actions-section">
      <button id = "newGroupBtn" class="btn btn-primary">New Group</button>
      <button id = "settingsBtn" lass="btn btn-secondary">Settings</button>
    </div>

    <footer class="footer">
      <small>Theme Group Switcher v0.3</small>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
