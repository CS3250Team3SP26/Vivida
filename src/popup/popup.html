<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ThemeGroups</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="popup-container">

      <!-- Header -->
      <header class="popup-header">
        <h1 class="current-group">Current Group Name</h1>
      </header>

      <!-- Body -->
      <main class="popup-body">
        <ul class="theme-list" aria-label="Theme options">
          <li><button class="theme-item" type="button">Theme Option 1</button></li>
          <li><button class="theme-item" type="button">Theme Option 2</button></li>
          <li><button class="theme-item" type="button">Theme Option 3</button></li>
          <li><button class="theme-item" type="button">Theme Option 4</button></li>
          <li><button class="theme-item" type="button">Theme Option 5</button></li>
          <li><button class="theme-item" type="button">Theme Option 6</button></li>
          <li><button class="theme-item" type="button">Theme Option 7</button></li>
        </ul>
      </main>

      <!-- Footer -->
      <footer class="popup-footer">
        <button class="manage-btn" type="button">Manage Groups</button>
      </footer>

    </div>
  </body>
</html>
